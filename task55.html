<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razorpay Integration Demo</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            text-align:center;
            width:350px;
        }

        button{
            background:#3399cc;
            color:white;
            border:none;
            padding:12px 20px;
            cursor:pointer;
            border-radius:5px;
            font-size:16px;
        }

        button:hover{
            background:#287aa9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Razorpay Payment Demo</h2>
    <p>Amount: ₹500</p>

    <button id="pay-btn">Pay Now</button>
</div>

<script>
document.getElementById("pay-btn").onclick = function () {

    var options = {
        "key": "YOUR_RAZORPAY_KEY_ID",
        "amount": 50000,
        "currency": "INR",
        "name": "Student Skill Hub",
        "description": "Demo Payment",
        "image": "https://razorpay.com/assets/razorpay-logo.svg",

        "handler": function (response) {
            alert(
                "Payment Successful!\nPayment ID: " +
                response.razorpay_payment_id
            );
        },

        "prefill": {
            "name": "Student",
            "email": "student@example.com",
            "contact": "9876543210"
        },

        "theme": {
            "color": "#3399cc"
        }
    };

    var rzp = new Razorpay(options);
    rzp.open();
};
</script>

</body>
</html>
